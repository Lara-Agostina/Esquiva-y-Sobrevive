<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>¡Esquiva y Sobrevive!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none; 
        }

        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
            padding: 0;
        }

        /* CONTENEDOR MAESTRO: En PC mantiene un tamaño cómodo, en móvil va a pantalla completa */
        #pantalla-global {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 95vw;
            max-width: 850px;
            padding: 10px;
        }

        #ui-contenedor {
            text-align: center;
            margin-bottom: 8px;
            width: 100%;
        }

        h1 {
            font-size: calc(1.1rem + 1vw);
            color: #00fff0;
            text-shadow: 0 0 10px rgba(0, 255, 240, 0.6);
        }

        #logro {
            font-size: calc(0.75rem + 0.4vw);
            color: #ff007f;
            font-weight: bold;
            min-height: 1.3rem;
            margin-top: 3px;
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.4);
        }

        /* El cuadro ahora ocupa TODO el ancho disponible en el dispositivo */
        #canvas-contenedor {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #162447;
            border: 3px solid #0f3460;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #instrucciones {
            margin-top: 10px;
            font-size: calc(0.65rem + 0.3vw);
            color: #8fa0c4;
            text-align: center;
            letter-spacing: 0.5px;
        }

        #pantalla-inicio {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 22, 44, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 20px;
            text-align: center;
        }

        #mensaje-inicio {
            margin-bottom: 15px; 
            color: #00fff0; 
            font-size: calc(1rem + 0.8vw);
        }

        button {
            background: #ff007f;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: calc(0.85rem + 0.4vw);
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 0, 127, 0.5);
            touch-action: manipulation; 
        }

        /* ========================================================
           CORRECCIÓN PARA MÓVILES EN PANTALLA COMPLETA
           Ocupa el 100% real del ancho del celular
           ======================================================== */
        @media (max-width: 767px) {
            #pantalla-global {
                width: 100vw;
                height: 100vh;
                max-width: none;
                max-height: none;
                padding: 10px env(safe-area-inset-right) 10px env(safe-area-inset-left);
            }
        }

        :fullscreen #pantalla-global {
            width: 100vw;
            height: 100vh;
            max-width: none;
            max-height: none;
            padding: 5px env(safe-area-inset-right) 5px env(safe-area-inset-left);
        }
        
        :-webkit-full-screen #pantalla-global {
            width: 100vw;
            height: 100vh;
            max-width: none;
            max-height: none;
            padding: 5px env(safe-area-inset-right) 5px env(safe-area-inset-left);
        }
    </style>
</head>
<body>

    <div id="pantalla-global">
        
        <div id="ui-contenedor">
            <h1>Puntos: <span id="marcador">0</span></h1>
            <div id="logro">¡Demuestra tus reflejos!</div>
        </div>

        <div id="canvas-contenedor">
            <div id="pantalla-inicio">
                <h2 id="mensaje-inicio">¿Podrás superar tu propio récord?</h2>
                <button id="btn-jugar" onmousedown="prepararInicio(event)" ontouchend="prepararInicio(event)">¡JUGAR!</button>
            </div>
            <canvas id="juegoCanvas"></canvas>
        </div>

        <div id="instrucciones">
        
        </div>

    </div>

    <script>
        const canvas = document.getElementById('juegoCanvas');
        const ctx = canvas.getContext('2d');
        const marcador = document.getElementById('marcador');
        const logroTxt = document.getElementById('logro');
        const pantallaInicio = document.getElementById('pantalla-inicio');
        const mensajeInicio = document.getElementById('mensaje-inicio');

        // Físicas fijas internas (no se alteran por el tamaño de pantalla)
        canvas.width = 800;
        canvas.height = 450;

        let audioCtx = null;

        function reproducirSonidoSalto() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const oscilador = audioCtx.createOscillator();
                const ganancia = audioCtx.createGain();

                oscilador.type = 'square'; 
                oscilador.frequency.setValueAtTime(160, audioCtx.currentTime); 
                oscilador.frequency.exponentialRampToValueAtTime(650, audioCtx.currentTime + 0.12); 

                ganancia.gain.setValueAtTime(0.12, audioCtx.currentTime);
                ganancia.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12); 

                oscilador.connect(ganancia);
                ganancia.connect(audioCtx.destination);

                oscilador.start();
                oscilador.stop(audioCtx.currentTime + 0.12);
            } catch(e) {
                console.log("Audio en espera");
            }
        }

        let juegoActivo = false;
        let puntos = 0;
        let velocidadBase = 6.5; 
        let particulas = [];

        const jugador = {
            x: 80, y: 0, ancho: 40, alto: 40,
            gravedad: 0.7, fuerzaSalto: -14, velocidadY: 0,
            enElSuelo: false, sueloY: canvas.height - 70
        };

        const obstaculo = {
            x: canvas.width, y: canvas.height - 70 - 45,
            ancho: 32, alto: 45, pasado: false
        };

        function actualizarLogro(puntosActuales) {
            if (puntosActuales === 0) {
                logroTxt.innerText = "¡Demuestra tus reflejos!";
                logroTxt.style.color = "#ff007f";
            } else if (puntosActuales === 5) { 
                logroTxt.innerText = "⭐ ¡Rango: Novato Decidido! ⭐"; 
                logroTxt.style.color = "#00fff0"; 
            } else if (puntosActuales === 12) { 
                logroTxt.innerText = "🔥 ¡Rango: Superviviente Veloz! 🔥"; 
                logroTxt.style.color = "#ffaa00"; 
            } else if (puntosActuales === 25) { 
                logroTxt.innerText = "👑 ¡Rango: Leyenda del Salto! 👑"; 
                logroTxt.style.color = "#ff007f"; 
            }
        }

        function crearParticulasFestejo(x, y) {
            for (let i = 0; i < 15; i++) {
                particulas.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    color: `hsl(${Math.random() * 360}, 100%, 60%)`,
                    vida: 25
                });
            }
        }

        function activarSalto(e) {
            if (e) e.preventDefault();
            if (jugador.enElSuelo && juegoActivo) {
                jugador.velocidadY = jugador.fuerzaSalto;
                jugador.enElSuelo = false;
                reproducirSonidoSalto();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                activarSalto(e);
            }
        });

        document.addEventListener('touchstart', (e) => {
            if (juegoActivo && e.target.id !== 'btn-jugar') {
                activarSalto(e);
            }
        }, { passive: false });

        document.addEventListener('mousedown', (e) => {
            if (juegoActivo && e.target.id !== 'btn-jugar') {
                activarSalto(e);
            }
        });

        function activarPantallaCompleta() {
            const elementoGlobal = document.getElementById('pantalla-global');
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext && !audioCtx) audioCtx = new AudioContext();

            if (elementoGlobal.requestFullscreen) {
                elementoGlobal.requestFullscreen().catch(err => console.log(err));
            } else if (elementoGlobal.webkitRequestFullscreen) { 
                elementoGlobal.webkitRequestFullscreen();
            }
        }

        let iniciando = false;
        function prepararInicio(e) {
            if (e) {
                e.preventDefault();
                e.stopPropagation();
            }
            if (iniciando) return;
            iniciando = true;
            
            iniciarJuego();
            
            setTimeout(() => { iniciando = false; }, 500);
        }

        function iniciarJuego() {
            activarPantallaCompleta();

            puntos = 0;
            velocidadBase = 6.5;
            particulas = [];
            marcador.innerText = puntos;
            actualizarLogro(0);
            
            jugador.y = jugador.sueloY - jugador.alto;
            jugador.velocidadY = 0;
            obstaculo.x = canvas.width;
            obstaculo.pasado = false;

            pantallaInicio.style.display = 'none';
            juegoActivo = true;

            bucleJuego();
        }

        function gameOver() {
            juegoActivo = false;
            mensajeInicio.innerHTML = `¡Fin del Juego!<br><span style="color: #ff007f; font-size: 1.6rem;">Puntos: ${puntos}</span>`;
            document.getElementById('btn-jugar').innerText = "Volver a Intentar";
            pantallaInicio.style.display = 'flex';
        }

        function bucleJuego() {
            if (!juegoActivo) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Suelo
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, jugador.sueloY, canvas.width, canvas.height - jugador.sueloY);
            ctx.strokeStyle = '#00fff0';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, jugador.sueloY);
            ctx.lineTo(canvas.width, jugador.sueloY);
            ctx.stroke();

            // Jugador
            jugador.velocidadY += jugador.gravedad;
            jugador.y += jugador.velocidadY;

            if (jugador.y + jugador.alto >= jugador.sueloY) {
                jugador.y = jugador.sueloY - jugador.alto;
                jugador.velocidadY = 0;
                jugador.enElSuelo = true;
            }

            ctx.fillStyle = '#00fff0';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00fff0';
            ctx.fillRect(jugador.x, jugador.y, jugador.ancho, jugador.alto);
            ctx.shadowBlur = 0;

            // Obstáculo
            let velocidadActual = velocidadBase + (puntos * 0.3);
            obstaculo.x -= velocidadActual;

            if (obstaculo.x + obstaculo.ancho < 0) {
                obstaculo.x = canvas.width;
                obstaculo.pasado = false;
                obstaculo.alto = 35 + Math.random() * 25; 
                obstaculo.y = jugador.sueloY - obstaculo.alto;
            }

            ctx.fillStyle = '#ff007f';
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#ff007f';
            ctx.fillRect(obstaculo.x, obstaculo.y, obstaculo.ancho, obstaculo.alto);
            ctx.shadowBlur = 0;

            // Partículas
            for (let i = particulas.length - 1; i >= 0; i--) {
                let p = particulas[i];
                p.x += p.vx; p.y += p.vy; p.vida--;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 4, 4);
                if (p.vida <= 0) particulas.splice(i, 1);
            }

            // Puntuación
            if (!obstaculo.pasado && obstaculo.x < jugador.x) {
                puntos++;
                marcador.innerText = puntos;
                obstaculo.pasado = true;
                actualizarLogro(puntos);
                crearParticulasFestejo(jugador.x + jugador.ancho, jugador.y);
            }

            // Colisiones
            if (
                jugador.x < obstaculo.x + obstaculo.ancho &&
                jugador.x + jugador.ancho > obstaculo.x &&
                jugador.y < obstaculo.y + obstaculo.alto &&
                jugador.y + jugador.alto > obstaculo.y
            ) {
                gameOver();
                return;
            }

            requestAnimationFrame(bucleJuego);
        }
    </script>
</body>
</html>
